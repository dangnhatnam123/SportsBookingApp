{% extends "admin/admin_base.html" %}
{% block admin_content %}
<h3 class="mb-4">Danh sách các sân thể thao</h3>

<div class="mb-3">
    <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalThemSan">
        <i class="fas fa-plus"></i> + Thêm Sân Mới
    </button>
</div>

<table class="table table-hover table-striped border">
    <thead class="table-primary">
    <tr>
        <th>Tên Sân</th>
        <th>Loại Sân</th>
        <th>Giá thuê/h</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    {% for s in danh_sach_san %}
    <tr>
        <td>{{ s.ten_san }}</td>
        <td>{{ s.loai_san.value }}</td>
        <td>{{ s.gia_san_theo_gio }} VNĐ</td>
        <td>
            <button class="btn btn-warning btn-sm">Sửa</button>
            <button class="btn btn-danger btn-sm">Xoá</button>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>

<div class="modal fade" id="modalThemSan" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Thêm Sân Thể Thao Mới</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form action="{{ url_for('courts_bp.add_san') }}" method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tên sân:</label>
                        <input type="text" name="ten_san" class="form-control" required
                               placeholder="Ví dụ: Sân bóng Chảo Lửa 5">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loại sân:</label>
                        <select name="loai_san" class="form-select">
                            <option value="BONG_DA">Bóng đá</option>
                            <option value="CAU_LONG">Cầu lông</option>
                            <option value="TENNIS">Tennis</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá thuê (VNĐ/giờ):</label>
                        <input type="number" name="gia" class="form-control" required placeholder="500000">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="submit" class="btn btn-primary">Lưu Sân</button>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
