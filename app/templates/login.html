<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang Nhap - HisSport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
<div class="w-full max-w-md">

    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-orange-500 rounded-2xl mb-4">
            <i class="fas fa-running text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">SportBooking</h1>
        <h2 class="text-2xl font-bold text-white">Xin chào bạn!</h2>
        <p class="text-slate-400 mt-2">Dang nhap de tiep tuc</p>
    </div>


    <div class="bg-slate-800/50 backdrop-blur-xl rounded-2xl p-8 border border-slate-700/50 shadow-2xl">


        {% if err_msg %}
        <div class="mb-4 p-3 rounded-lg bg-red-500/20 text-red-400 border border-red-500/30">
            {{ err_msg }}
        </div>
        {% endif %}

        <form method="POST" action="/login">

            <div class="mb-5">
                <label class="block text-slate-300 text-sm font-medium mb-2">
                    Ten dang nhap
                </label>
                <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-user"></i>
                        </span>
                    <input type="text" name="username" required
                           placeholder="Nhap ten dang nhap"
                           class="w-full pl-10 pr-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                </div>
            </div>


            <div class="mb-6">
                <label class="block text-slate-300 text-sm font-medium mb-2">
                    Mat khau
                </label>
                <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                    <input type="password" name="password" id="password" required
                           placeholder="Nhap mat khau"
                           class="w-full pl-10 pr-12 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                    <button type="button" onclick="togglePassword()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <i class="fas fa-eye" id="toggle-icon"></i>
                    </button>
                </div>
            </div>


            <button type="submit"
                    class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-emerald-500/25">
                <i class="fas fa-sign-in-alt mr-2"></i>Dang Nhap
            </button>
        </form>


        <p class="text-center text-slate-400 mt-6">
            Chua co tai khoan?
            <a href="/register" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">
                Dang ky ngay
            </a>
        </p>
    </div>


    <p class="text-center text-slate-500 text-sm mt-6">
        2026 SportBook. All rights reserved.
    </p>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggle-icon');

        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
</script>
</body>
</html>
