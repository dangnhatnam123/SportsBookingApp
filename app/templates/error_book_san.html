{% extends 'layout/base.html' %}

{% block title %}Lỗi quá hạn {% endblock %}

{% block content %}
<div class="container mt-5 mb-5 d-flex justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="card shadow border-0" style="max-width: 500px; border-radius: 16px; border-top: 6px solid #dc3545 !important;">
        <div class="card-body text-center p-5">
            
            <div class="mb-4">
                <i class="bi bi-exclamation-octagon-fill text-danger shadow-sm rounded-circle bg-light" style="font-size: 4rem; padding: 10px 20px;"></i>
            </div>

            <h3 class="fw-bold text-danger mb-3">Lỗi!!!!!!</h3>

            <p class="text-secondary fs-6 mb-4 line-height-base">
                Bạn đã đặt <span class="fw-bold text-danger">3 sân</span> trong ngày
                <span class="fw-bold text-danger">{{ngay}}</span>
                này rồi.
                Bên tôi chỉ cho phép mỗi người đặt tối đa 3 sân một ngày thôi. Mong bạn thông cảm vì bất tiện này!
            </p>

            <a href="/search" class="btn btn-success fw-bold px-4 py-2 shadow-sm rounded-pill w-100">
                <i class="bi bi-search me-1"></i> Tìm sân ngày khác.
            </a>
            
        </div>
    </div>
</div>
{% endblock %}
