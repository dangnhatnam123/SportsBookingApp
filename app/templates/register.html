<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dang Ky - HiSport</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
<div class="w-full max-w-md">

    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-500 rounded-2xl mb-4">
            <i class="fas fa-futbol text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-white">Tao tai khoan moi</h1>
        <p class="text-slate-400 mt-2">Dang ky de bat dau dat san</p>
    </div>


    <div class="bg-slate-800/50 backdrop-blur-xl rounded-2xl p-8 border border-slate-700/50 shadow-2xl">


        {% if err_msg %}
        <div class="mb-4 p-3 rounded-lg bg-red-500/20 text-red-400 border border-red-500/30">
            {{ err_msg }}
        </div>
        {% endif %}

        <form method="POST" action="/register" enctype="multipart/form-data">

            <div class="mb-4">
                <label class="block text-slate-300 text-sm font-medium mb-2">
                    Ho va ten <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-user"></i>
                        </span>
                    <input type="text" name="name" required
                           placeholder="Nhap ho va ten"
                           class="w-full pl-10 pr-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                </div>
            </div>


            <div class="mb-4">
                <label class="block text-slate-300 text-sm font-medium mb-2">
                    Ten dang nhap <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-at"></i>
                        </span>
                    <input type="text" name="username" required minlength="3"
                           placeholder="Nhap ten dang nhap"
                           class="w-full pl-10 pr-4 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                </div>
                <p class="text-slate-500 text-xs mt-1">It nhat 3 ky tu</p>
            </div>


            <div class="mb-4">
                <label class="block text-slate-300 text-sm font-medium mb-2">
                    Mat khau <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                    <input type="password" name="password" id="password" required minlength="6"
                           placeholder="Nhap mat khau"
                           class="w-full pl-10 pr-12 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                    <button type="button" onclick="togglePassword('password', 'toggle-icon-1')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <i class="fas fa-eye" id="toggle-icon-1"></i>
                    </button>
                </div>
                <p class="text-slate-500 text-xs mt-1">It nhat 6 ky tu</p>
            </div>


            <div class="mb-4">
                <label class="block text-slate-300 text-sm font-medium mb-2">
                    Xac nhan mat khau <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-lock"></i>
                        </span>
                    <input type="password" name="confirm" id="confirm" required
                           placeholder="Nhap lai mat khau"
                           class="w-full pl-10 pr-12 py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                    <button type="button" onclick="togglePassword('confirm', 'toggle-icon-2')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-white transition-colors">
                        <i class="fas fa-eye" id="toggle-icon-2"></i>
                    </button>
                </div>
            </div>


            <div class="mb-6">
                <label class="block text-slate-300 text-sm font-medium mb-2">
                    Anh dai dien
                </label>
                <div class="relative">
                    <input type="file" name="avatar" id="avatar" accept="image/*"
                           class="hidden" onchange="previewAvatar(this)">
                    <label for="avatar"
                           class="flex items-center justify-center w-full py-3 bg-slate-700/50 border border-slate-600 border-dashed rounded-lg text-slate-400 hover:text-white hover:border-emerald-500 cursor-pointer transition-all">
                        <i class="fas fa-cloud-upload-alt mr-2"></i>
                        <span id="file-name">Chon anh dai dien</span>
                    </label>
                </div>
                <!-- Preview Avatar -->
                <div id="avatar-preview" class="hidden mt-3 flex justify-center">
                    <img id="preview-img" src="" alt="Preview"
                         class="w-20 h-20 rounded-full object-cover border-2 border-emerald-500">
                </div>
            </div>

            <button type="submit"
                    class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-emerald-500/25">
                <i class="fas fa-user-plus mr-2"></i>Dang Ky
            </button>
        </form>


        <p class="text-center text-slate-400 mt-6">
            Da co tai khoan?
            <a href="/login" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">
                Dang nhap
            </a>
        </p>
    </div>


    <p class="text-center text-slate-500 text-sm mt-6">
        2026 SportBook. All rights reserved.
    </p>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);

        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    function previewAvatar(input) {
        const fileName = document.getElementById('file-name');
        const previewContainer = document.getElementById('avatar-preview');
        const previewImg = document.getElementById('preview-img');

        if (input.files && input.files[0]) {
            fileName.textContent = input.files[0].name;

            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewContainer.classList.remove('hidden');
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
