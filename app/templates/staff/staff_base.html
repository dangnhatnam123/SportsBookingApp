<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Khu Vực Nhân Viên{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">

    <style>
        /* Ghi đè tuỳ chỉnh cho Sidebar dựa trên main.css */
        body { overflow-x: hidden; background-color: #f4f7f6; /* Đồng bộ với search.css */ }

        .staff-sidebar {
            min-height: 100vh;
            background-color: var(--blue-dark, #172554); /* Sử dụng màu xanh đậm của ông */
            padding-top: 20px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .staff-sidebar a.nav-item {
            color: #e2e8f0;
            padding: 14px 20px;
            display: block;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .staff-sidebar a.nav-item:hover, .staff-sidebar a.nav-item.active {
            background-color: rgba(255, 255, 255, 0.08);
            color: var(--yellow-accent, #facc15); /* Sử dụng màu vàng nhấn của ông */
            border-left: 4px solid var(--yellow-accent, #facc15);
        }

        .staff-sidebar .group-title {
            color: #94a3b8;
            letter-spacing: 1px;
        }

        .main-content { min-height: 100vh; padding: 20px; }
    </style>
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">

            <div class="col-md-2 staff-sidebar sticky-top">

                <div class="text-center mb-4 px-3">
                    <a href="/" class="text-decoration-none fs-4 fw-bold text-white d-block">
                        SPORTS<span style="color: var(--yellow-accent, #facc15);">BOOKING</span>
                    </a>
                </div>

                <div class="text-center mb-3">
                    <img src="{{ current_user.avatar }}" alt="Avatar" class="rounded-circle mb-2" style="width: 70px; height: 70px; object-fit: cover; border: 3px solid var(--yellow-accent, #facc15);">
                    <h6 class="text-white mb-0">{{ current_user.ho_ten }}</h6>
                    <small style="color: #4ade80;"><i class="bi bi-circle-fill" style="font-size: 8px;"></i> Đang trực quầy</small>
                </div>

                <hr class="border-2 mx-3 opacity-25" style="border-color: var(--text-light, #f8fafc);">

                <p class="small px-3 mt-4 mb-1 fw-bold group-title">HỆ THỐNG</p>
                <a href="{{ url_for('staff_bp.staff_dashboard') }}" class="nav-item">
                    <i class="bi bi-calendar-check me-2"></i> Trực Sân (Duyệt)
                </a>

                <p class="small px-3 mt-4 mb-1 fw-bold group-title">GIAO DỊCH</p>
                <a href="/search" class="nav-item">
                    <i class="bi bi-shop me-2"></i> POS Đặt Sân Hộ
                </a>
                <a href="{{ url_for('staff_bp.staff_history_view') }}" class="nav-item">
                    <i class="bi bi-receipt me-2"></i> Lịch Sử Hóa Đơn
                </a>

                <div class="mt-5 px-3">
                    <a href="/logout" class="btn w-100 text-start" style="color: #f87171; border: 1px solid #f87171; padding: 10px 15px;">
                        <i class="bi bi-box-arrow-right me-2"></i> Đăng xuất
                    </a>
                </div>
            </div>

            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
