<div class="bg-slate-800/50 backdrop-blur-xl rounded-2xl p-8 border border-slate-700/50 shadow-2xl">

    {% if err_msg %}
    <div class="mb-4 p-3 rounded-lg bg-red-500/20 text-red-400 border border-red-500/30 text-sm text-center">
        <i class="fas fa-exclamation-circle mr-2"></i> {{ err_msg }}
    </div>
    {% endif %}

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 p-3 rounded-lg bg-blue-500/20 text-blue-400 border border-blue-500/30 text-sm text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/verify-otp">
        <div class="mb-6">
            <label class="block text-slate-300 text-sm font-medium mb-4 text-center">
                Nhập mã xác thực gửi đến số: <span class="text-emerald-400">{{ session['temp_user']['phone'] }}</span>
            </label>
            <input type="text" name="otp" required maxlength="6" pattern="[0-9]{6}"
                   placeholder="000000"
                   class="w-full text-center tracking-[0.5em] text-2xl py-3 bg-slate-700/50 border border-slate-600 rounded-lg text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
        </div>

        <button type="submit"
                class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-lg transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-emerald-500/25">
            Xác nhận Đăng ký
        </button>
    </form>

    <div class="text-center mt-6">
        <p class="text-slate-400 text-sm">
            Bạn chưa nhận được mã?
            <a href="{{ url_for('auth_bp.resend_otp') }}" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors underline">
                Gửi lại mã
            </a>
        </p>
        <a href="/register" class="inline-block mt-4 text-slate-500 hover:text-slate-300 text-xs">
            <i class="fas fa-arrow-left mr-1"></i> Quay lại trang đăng ký
        </a>
    </div>
</div>
